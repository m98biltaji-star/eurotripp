<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Europe 2026: 15k QAR Blueprint</title>
    <style>
        :root {
            --bg: #000000;
            --app-bg: #121212;
            --card-bg: #1e1e1e;
            --accent: #38bdf8;
            --text: #ffffff;
            --text-muted: #a0a0a0;
            --border-color: #333;
        }

        body {
            background-color: var(--bg);
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            margin: 0;
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;
            overflow: hidden;
        }

        /* Mobile Phone Container */
        .app-container {
            width: 100%;
            max-width: 400px;
            height: 850px;
            max-height: 100vh;
            background-color: var(--app-bg);
            position: relative;
            overflow: hidden;
            border-radius: 40px;
            box-shadow: 0 0 50px rgba(56, 189, 248, 0.15);
            border: 8px solid #222;
            display: flex;
            flex-direction: column;
        }

        /* Top Navigation Scroll */
        .day-nav {
            display: flex;
            overflow-x: auto;
            background-color: rgba(18, 18, 18, 0.9);
            backdrop-filter: blur(10px);
            padding: 1.5rem 1rem 1rem 1rem;
            gap: 1rem;
            position: absolute;
            top: 0;
            width: 100%;
            z-index: 10;
            box-sizing: border-box;
            scrollbar-width: none;
        }
        .day-nav::-webkit-scrollbar { display: none; }

        .day-pill {
            background-color: var(--card-bg);
            color: var(--text-muted);
            padding: 8px 20px;
            border-radius: 20px;
            font-weight: 600;
            font-size: 0.9rem;
            white-space: nowrap;
            cursor: pointer;
            transition: all 0.2s;
            border: 1px solid var(--border-color);
        }

        .day-pill.active {
            background-color: var(--accent);
            color: #000;
            border-color: var(--accent);
        }

        /* Scrollable Content */
        .content-scroll {
            flex: 1;
            overflow-y: auto;
            scrollbar-width: none;
            padding-bottom: 2rem;
        }
        .content-scroll::-webkit-scrollbar { display: none; }

        /* Hero Section */
        .hero {
            position: relative;
            height: 350px;
            width: 100%;
        }
        .hero img {
            width: 100%;
            height: 100%;
            object-fit: cover;
        }
        .hero-overlay {
            position: absolute;
            bottom: 0;
            left: 0;
            width: 100%;
            height: 70%;
            background: linear-gradient(to top, rgba(18,18,18,1) 10%, rgba(18,18,18,0));
            display: flex;
            flex-direction: column;
            justify-content: flex-end;
            padding: 1.5rem;
            box-sizing: border-box;
        }
        .hero-date {
            color: var(--accent);
            font-size: 0.85rem;
            font-weight: 800;
            text-transform: uppercase;
            letter-spacing: 1px;
            margin-bottom: 5px;
        }
        .hero-city {
            color: var(--text);
            font-size: 2.8rem;
            font-weight: 800;
            line-height: 1;
            margin-bottom: 8px;
        }
        .hero-theme {
            color: var(--text-muted);
            font-size: 1.1rem;
            font-weight: 500;
        }

        /* Feed / Events */
        .feed {
            padding: 1.5rem;
            display: flex;
            flex-direction: column;
            gap: 1.5rem;
        }

        .event-card {
            background-color: var(--card-bg);
            border-radius: 20px;
            overflow: hidden;
            display: flex;
            flex-direction: column;
            box-shadow: 0 4px 15px rgba(0,0,0,0.3);
            animation: slideUp 0.4s ease forwards;
            opacity: 0;
            transform: translateY(20px);
            cursor: pointer;
            border: 1px solid var(--border-color);
            transition: transform 0.2s, border-color 0.2s;
        }
        .event-card:active {
            transform: scale(0.98);
        }

        .event-card:nth-child(1) { animation-delay: 0.05s; }
        .event-card:nth-child(2) { animation-delay: 0.15s; }
        .event-card:nth-child(3) { animation-delay: 0.25s; }
        .event-card:nth-child(4) { animation-delay: 0.35s; }

        .event-img {
            width: 100%;
            height: 160px;
            object-fit: cover;
        }

        .event-info {
            padding: 1.25rem;
            position: relative;
        }

        .event-time {
            position: absolute;
            top: -15px;
            right: 20px;
            background-color: var(--accent);
            color: #000;
            font-size: 0.75rem;
            font-weight: 800;
            padding: 6px 14px;
            border-radius: 12px;
            box-shadow: 0 4px 10px rgba(56, 189, 248, 0.3);
            letter-spacing: 0.5px;
        }

        .event-title {
            color: var(--text);
            font-size: 1.25rem;
            font-weight: 700;
            margin-bottom: 6px;
        }

        .event-desc {
            color: var(--text-muted);
            font-size: 0.95rem;
            line-height: 1.5;
        }
        
        .click-hint {
            margin-top: 10px;
            font-size: 0.8rem;
            color: var(--accent);
            font-weight: 600;
            display: flex;
            align-items: center;
            gap: 5px;
        }

        /* Detail Modal Overlay */
        .modal {
            position: absolute;
            top: 100%; /* Hidden initially */
            left: 0;
            width: 100%;
            height: 100%;
            background-color: var(--app-bg);
            z-index: 50;
            transition: top 0.4s cubic-bezier(0.16, 1, 0.3, 1);
            display: flex;
            flex-direction: column;
            overflow: hidden;
        }
        .modal.open {
            top: 0;
        }

        .modal-header {
            padding: 1.5rem;
            display: flex;
            justify-content: flex-end;
            position: absolute;
            width: 100%;
            box-sizing: border-box;
            z-index: 60;
            background: linear-gradient(to bottom, rgba(0,0,0,0.8), rgba(0,0,0,0));
        }

        .close-btn {
            background: rgba(255,255,255,0.2);
            backdrop-filter: blur(5px);
            border: none;
            width: 36px;
            height: 36px;
            border-radius: 50%;
            color: white;
            font-size: 1.2rem;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .modal-content {
            flex: 1;
            overflow-y: auto;
            scrollbar-width: none;
            padding-bottom: 3rem;
        }
        .modal-content::-webkit-scrollbar { display: none; }

        .gallery-scroll {
            display: flex;
            overflow-x: auto;
            scroll-snap-type: x mandatory;
            scrollbar-width: none;
            height: 300px;
        }
        .gallery-scroll::-webkit-scrollbar { display: none; }
        
        .gallery-img {
            min-width: 100%;
            height: 100%;
            object-fit: cover;
            scroll-snap-align: start;
        }

        .modal-body {
            padding: 1.5rem;
        }

        .modal-tag {
            background: rgba(56, 189, 248, 0.15);
            color: var(--accent);
            padding: 6px 12px;
            border-radius: 8px;
            font-size: 0.8rem;
            font-weight: 700;
            display: inline-block;
            margin-bottom: 1rem;
        }

        .modal-title {
            font-size: 2rem;
            font-weight: 800;
            margin-bottom: 1rem;
            line-height: 1.2;
            color: var(--text);
        }

        .detail-row {
            display: flex;
            margin-bottom: 1rem;
            background: var(--card-bg);
            padding: 1rem;
            border-radius: 12px;
            border: 1px solid var(--border-color);
        }
        .detail-label {
            color: var(--text-muted);
            font-size: 0.85rem;
            width: 100px;
            font-weight: 600;
        }
        .detail-value {
            color: var(--text);
            font-size: 0.9rem;
            font-weight: 500;
            flex: 1;
        }

        .modal-full-desc {
            color: var(--text-muted);
            line-height: 1.6;
            font-size: 1.05rem;
            margin-top: 1.5rem;
        }

        @keyframes slideUp {
            to { opacity: 1; transform: translateY(0); }
        }

        @media (max-width: 450px) {
            .app-container {
                border: none;
                border-radius: 0;
                height: 100vh;
                max-width: 100%;
            }
        }
    </style>
</head>

        // DOM Elements
        const dayNav = document.getElementById('dayNav');
        const appBody = document.getElementById('appBody');
        const modal = document.getElementById('detailModal');
        const contentScroll = document.getElementById('contentScroll');

        // Init App
        function init() {
            renderNav();
            selectDay(0);
        }

        // Render Top Navigation
        function renderNav() {
            itinerary.forEach((data, index) => {
                const pill = document.createElement('div');
                pill.className = `day-pill`;
                pill.innerText = `Day ${data.day}`;
                pill.onclick = () => selectDay(index, pill);
                dayNav.appendChild(pill);
            });
        }

        // Handle Day Selection
        function selectDay(index, clickedPill = null) {
            const pills = document.querySelectorAll('.day-pill');
            pills.forEach(p => p.classList.remove('active'));
            
            const targetPill = clickedPill || pills[index];
            if(targetPill) {
                targetPill.classList.add('active');
                targetPill.scrollIntoView({ behavior: 'smooth', inline: 'center', block: 'nearest' });
            }

            renderContent(itinerary[index], index);
            contentScroll.scrollTop = 0;
        }

        // Render Main Feed
        function renderContent(data, dayIndex) {
            let eventsHtml = data.events.map((event, eventIndex) => `
                <div class="event-card" onclick="openModal(${dayIndex}, ${eventIndex})">
                    <img src="${event.img}" class="event-img" alt="${event.title}">
                    <div class="event-info">
                        <div class="event-time">${event.time}</div>
                        <div class="event-title">${event.title}</div>
                        <div class="event-desc">${event.desc}</div>
                        <div class="click-hint">Tap for details <span>→</span></div>
                    </div>
                </div>
            `).join('');

            appBody.innerHTML = `
                <div class="hero">
                    <img src="${data.heroImg}" alt="${data.city}">
                    <div class="hero-overlay">
                        <div class="hero-date">DAY ${data.day} • ${data.date}</div>
                        <div class="hero-city">${data.city}</div>
                        <div class="hero-theme">${data.theme}</div>
                    </div>
                </div>
                <div class="feed">
                    ${eventsHtml}
                </div>
            `;
        }

        // Open Detail Overlay
        function openModal(dayIndex, eventIndex) {
            const event = itinerary[dayIndex].events[eventIndex];
            
            // Populate Details
            document.getElementById('modalTitle').innerText = event.title;
            document.getElementById('modalTime').innerText = event.time;
            document.getElementById('modalLoc').innerText = event.location;
            document.getElementById('modalDress').innerText = event.dressCode;
            document.getElementById('modalDesc').innerText = event.fullDesc;

            // Populate Gallery (Main image + extra gallery images)
            const galleryScroll = document.getElementById('modalGallery');
            let imagesToLoad = [event.img, ...event.gallery];
            
            galleryScroll.innerHTML = imagesToLoad.map(src => `
                <img src="${src}" class="gallery-img">
            `).join('');
            
            // Reset scroll position and open
            galleryScroll.scrollLeft = 0;
            document.querySelector('.modal-content').scrollTop = 0;
            modal.classList.add('open');
        }

        // Close Detail Overlay
        function closeModal() {
            modal.classList.remove('open');
        }

        // Start App
        init();
    </script>
